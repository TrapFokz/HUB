<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemple — Projet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3150;
      --accent: #6c63ff;
      --accent-light: #8b85ff;
      --text: #e2e4f0;
      --text-muted: #7b7f9e;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent-light); }
    nav .sep { color: var(--border); }
    nav .current { color: var(--text); font-weight: 600; }
    main {
      flex: 1;
      padding: 60px 28px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--accent-light), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p { color: var(--text-muted); line-height: 1.6; }
  </style>
</head>
<body>
  <nav>
    <a href="../../index.html">← Hub</a>
    <span class="sep">/</span>
    <span class="current">Exemple</span>
  </nav>
  <main>
    <h1>Projet Exemple</h1>
    <p>Contenu du projet à venir. Modifiez ce fichier pour démarrer.</p>
  </main>
</body>
</html>
